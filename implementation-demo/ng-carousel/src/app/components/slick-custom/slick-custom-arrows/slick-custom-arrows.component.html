<section class="container">
  <div class="section-header">
    <div>
      <h1>Custom Arrow Slick Slider</h1>
      <p class="subtitle">
        Slick with external custom navigation buttons and live Picsum API data
      </p>
    </div>
  </div>

  <p class="status" *ngIf="isLoading">Loading live images...</p>
  <p class="status error" *ngIf="errorMessage">{{ errorMessage }}</p>

  <div class="slider-shell" *ngIf="!isLoading && images.length > 0">
    <button
      type="button"
      class="arrow-button arrow-button--prev"
      (click)="showPrevious()"
      aria-label="Show previous slides"
    >
      <span aria-hidden="true">&larr;</span>
    </button>

    <ngx-slick-carousel
      #slickModal="slick-carousel"
      class="carousel"
      [config]="slideConfig"
    >
      <div ngxSlickItem *ngFor="let image of images" class="slide-shell-item">
        <article class="slide">
          <div class="image-frame">
            <img
              [src]="image.url"
              [alt]="image.title ? image.title : 'Carousel image'"
            />
          </div>

          <div class="caption">
            <p class="eyebrow">Live Gallery</p>
            <h2>{{ image.title }}</h2>
            <p class="author">{{ image.author }}</p>
          </div>
        </article>
      </div>
    </ngx-slick-carousel>

    <button
      type="button"
      class="arrow-button arrow-button--next"
      (click)="showNext()"
      aria-label="Show next slides"
    >
      <span aria-hidden="true">&rarr;</span>
    </button>
  </div>
</section>
