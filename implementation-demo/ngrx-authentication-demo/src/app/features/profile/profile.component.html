<div class="main-div">
  <mat-card class="auth-card">
    <mat-toolbar color="primary" class="card-heading">
      Profile
      <span class="spacer"></span>
      <button mat-icon-button (click)="onLogout()" title="Logout">
        <mat-icon>logout</mat-icon>
      </button>
    </mat-toolbar>

    <form [formGroup]="profileForm" (ngSubmit)="onUpdate()" class="auth-form">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Name</mat-label>
        <input matInput formControlName="name" aria-label="Name" />
        <mat-error *ngIf="name?.errors?.['required']"
          >Name is required</mat-error
        >
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input
          matInput
          type="email"
          formControlName="email"
          aria-label="Email"
        />
      </mat-form-field>

      <div class="api-error" *ngIf="error$ | async as error">{{ error }}</div>
      <div class="api-success" *ngIf="success$ | async as msg">{{ msg }}</div>

      <button
        mat-raised-button
        color="primary"
        type="submit"
        [disabled]="loading$ | async"
      >
        <mat-spinner
          diameter="20"
          *ngIf="loading$ | async; else label"
        ></mat-spinner>
        <ng-template #label>Update Profile</ng-template>
      </button>
    </form>
  </mat-card>
</div>
