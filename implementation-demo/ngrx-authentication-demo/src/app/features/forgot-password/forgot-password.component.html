<div class="main-div">
  <mat-card class="auth-card">
    <mat-toolbar color="primary" class="card-heading"
      >Forgot Password</mat-toolbar
    >

    <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="auth-form">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input
          matInput
          type="email"
          formControlName="email"
          aria-label="Email"
        />
        <mat-error *ngIf="email?.errors?.['required']"
          >Email is required</mat-error
        >
        <mat-error *ngIf="email?.errors?.['email']"
          >Invalid email format</mat-error
        >
      </mat-form-field>

      <div class="api-error" *ngIf="error$ | async as error">{{ error }}</div>
      <div class="api-success" *ngIf="success$ | async as msg">{{ msg }}</div>

      <button
        mat-raised-button
        color="primary"
        type="submit"
        [disabled]="loading$ | async"
      >
        <mat-spinner
          diameter="20"
          *ngIf="loading$ | async; else label"
        ></mat-spinner>
        <ng-template #label>Submit</ng-template>
      </button>

      <div class="button-row">
        <a routerLink="/login">Back to Login</a>
      </div>
    </form>
  </mat-card>
</div>
