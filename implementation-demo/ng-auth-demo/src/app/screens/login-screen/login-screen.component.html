<div class="main-div">
  <mat-card class="login-card">
    <mat-toolbar color="primary" class="login_page_THeading">
      Login Page
    </mat-toolbar>

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="login-form">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input
          matInput
          type="email"
          formControlName="email"
          aria-label="Email for login"
        />
        <mat-error *ngIf="email?.touched && email?.errors?.['required']"
          >Email is required</mat-error
        >
        <mat-error *ngIf="email?.touched && email?.errors?.['email']"
          >Invalid email format</mat-error
        >
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input
          matInput
          [type]="hide ? 'password' : 'text'"
          formControlName="password"
        />
        <button mat-icon-button matSuffix type="button" (click)="hide = !hide">
          <mat-icon>{{ hide ? "visibility_off" : "visibility" }}</mat-icon>
        </button>
        <mat-error *ngIf="password?.touched && password?.errors?.['required']"
          >Password is required</mat-error
        >
        <mat-error *ngIf="password?.touched && password?.errors?.['minlength']"
          >Minimum 6 characters</mat-error
        >
      </mat-form-field>

      <button mat-raised-button color="primary" type="submit">Login</button>

      <div class="button-row">
        <a routerLink="/register">Register</a>
      </div>

      <div class="button-row">
        <a routerLink="/forgot-password">Forgot Password</a>
      </div>
    </form>
  </mat-card>
</div>
